<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SiDasawisma" />
    <meta name="application-name" content="SiDasawisma" />
    <meta name="description" content="Aplikasi kependudukan untuk kader Dasawisma RT/RW" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Splash screen color -->
    <meta name="msapplication-TileColor" content="#16a34a" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/icons/icon-192x192.png" />

    <title>SiDasawisma</title>
  </head>
  <body>
    <noscript>Aplikasi ini membutuhkan JavaScript untuk berjalan.</noscript>
    <div id="root"></div>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.log('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
